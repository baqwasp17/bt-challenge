<h1>Decrypting...</h1>
<p>Analyzing results...</p>

<script>
function launchConfetti(){
    let duration = 3000;
    let end = Date.now() + duration;

    (function frame(){
        confetti({
            particleCount: 6,
            spread: 70,
            origin: { y: 0.6 }
        });

        if(Date.now() < end){
            requestAnimationFrame(frame);
        }
    })();
}

setTimeout(()=>{

    launchConfetti();

    document.body.innerHTML = `
        <h1>COMPLETE</h1>

        <p>You followed every clue.</p>

        <p>QR codes scanned. Ciphers decoded. Forms completed.</p>

        <hr>

        <p>Nothing was tracked.</p>
        <p>Everything was intentional nonsense.</p>

        <h2>🏆 Achievement Unlocked</h2>
        <p>Professional Rabbit Hole Explorer</p>

        <br>

        <p>Made by Yours truly Neani Glntv</p>
    `;

}, 3000);
</script>
