<!DOCTYPE html>
<html>
<head>
<title>Terminal</title>
<style>
body{background:#111;color:white;font-family:monospace;padding:40px}
input,button{padding:10px;margin-top:10px}
.hidden{display:none}
</style>
</head>

<body>

<h2>IDENTITY CHECK</h2>

<p>Answer (not saved):</p>
<ul>
<li>Your favorite color?</li>
<li>My favorite music artist?</li>
</ul>

<hr>

<p>Decode this:</p>
<pre>uryyb qrgrpgvir Ounegv</pre>

<p>Enter decoded phrase:</p>

<input id="pw">
<button onclick="check()">Submit</button>

<p id="fail" style="color:red"></p>

<div id="next" class="hidden">
    <h3>Access Granted</h3>
    <p>Continue investigation:</p>
    <a href="https://forms.gle/d1cEC4JfSiWahMco9">Proceed</a>
</div>

<script>
function check(){
  let v = document.getElementById("pw").value.toLowerCase();
  if(v === "hello detective Bharti"){
    document.getElementById("next").style.display="block";
  } else {
    document.getElementById("fail").innerText="Incorrect decoding.";
  }
}
</script>

</body>
</html>
