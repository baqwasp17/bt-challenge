<!DOCTYPE html>
<html>
<head>
<title>Archive Node</title>

<style>
body{
background:#000;
color:#cfcfcf;
font-family:monospace;
padding:40px;
}

.box{
border:1px solid #444;
padding:20px;
max-width:600px;
}

#qr{
display:none;
margin-top:20px;
}
</style>
</head>

<body>

<div class="box">

<h2>ARCHIVE NODE</h2>

<p>Status: LOCKED</p>

<p>Encrypted stream:</p>

<pre>-. . .- .-. .-.. -.--</pre>

<p>Enter decoded word:</p>

<input id="morse">
<button onclick="check()">Submit</button>

<p id="msg"></p>

<div id="qr">
    <h3>Override Granted</h3>
    <p>Final access node detected:</p>

    <!-- QR2 goes here -->
    <a href="final.html">
        <img src="images/qr2.png" width="220">
    </a>

    <p>Scan to continue.</p>
</div>

</div>

<script>
function check(){
    let v = document.getElementById("morse").value.trim().toLowerCase();

    if(v === "nearly"){
        document.getElementById("msg").innerText = "Access granted.";
        document.getElementById("qr").style.display = "block";
    } else {
        document.getElementById("msg").innerText = "Incorrect decryption.";
    }
}
</script>

</body>
</html>
